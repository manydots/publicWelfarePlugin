name: Client插件编译

on:
  workflow_dispatch:

jobs:
  build-client:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: true

      # ======================
      # 版本号：client-v1.0.0
      # ======================
      - name: 生成客户端版本号
        id: version
        shell: bash
        run: |
          new_tag="client-v1.0.0"
          latest=$(gh release list --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          
          if [[ -n "$latest" && $latest =~ client-v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            patch=${BASH_REMATCH[3]}
            new_patch=$((patch + 1))
            new_tag="client-v$major.$minor.$new_patch"
          fi
          
          echo "tag=$new_tag" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 启用VS编译工具
      - name: 安装MSBuild
        uses: microsoft/setup-msbuild@v2

      # ======================
      # 仅编译 x86 C++17
      # ======================
      - name: 编译 Client/Fd/Fd.sln
        run: |
          msbuild "Client/Fd/Fd.sln" ^
          /t:Rebuild ^
          /p:Configuration=Release ^
          /p:Platform=Win32 ^
          /p:PlatformToolset=v143 ^
          /p:CXX_STANDARD=17

      # ======================
      # 提取编译好的 x86 DLL
      # ======================
      - name: 收集插件
        run: |
          mkdir output
          xcopy "Client\Fd\Win32\Release\*.dll" "output\" /y
          xcopy "Client\Fd\Release\*.dll" "output\" /y

      # ======================
      # 发布到 Releases
      # ======================
      - name: 上传到GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          body: "客户端插件\n Fd.dll"
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}