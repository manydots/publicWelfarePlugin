name: Client插件编译

on:
  workflow_dispatch:

jobs:
  build-client:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: true

      # 客户端版本号
      - name: 生成Client发布版本号
        id: version
        shell: bash
        run: |
          new_tag="client-v1.0.0"
          latest=$(gh release list --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [[ -n "$latest" && $latest =~ client-v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            new_tag="client-v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3]+1))"
          fi
          echo "tag=$new_tag" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装MSBuild
        uses: microsoft/setup-msbuild@v2

      # 对于 C++ 项目，安装 Visual Studio 构建工具
      - name: 安装 Visual Studio 构建工具
        run: |
          choco install visualstudio2022buildtools -y
          choco install visualstudio2022-workload-vctools -y
        continue-on-error: true

      # 编译项目 - 使用 Win32 平台
      - name: 编译 Client/Fd/Fd.sln
        run: |
          msbuild "Client/Fd/Fd.sln" /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143
          
      - name: 收集编译的插件
        run: |
          mkdir output
          echo "Searching for compiled dll files..."
          
          # 显示目录结构以便调试
          echo "Directory structure:"
          dir /s /b Client\Fd\*.dll
          
          # 查找 Fd.dll 文件（可能在多个位置）
          if exist "Client\Fd\Fd.dll" (
            echo "Found Fd.dll in Client\Fd"
            copy "Client\Fd\Fd.dll" "output\"
          ) elseif exist "Client\Fd\Win32\Release\Fd.dll" (
            echo "Found Fd.dll in Win32\Release"
            copy "Client\Fd\Win32\Release\Fd.dll" "output\"
          ) elseif exist "Client\Fd\Release\Fd.dll" (
            echo "Found Fd.dll in Release"
            copy "Client\Fd\Release\Fd.dll" "output\"
          ) else (
            echo "Fd.dll not found in common locations!"
            echo "Searching all locations:"
            dir /s Client\Fd\Fd.dll
          )
          
          echo "Files in output:"
          dir output

      # 发布到 Releases
      - name: 上传到GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          body: "客户端插件\n Fd.dll"
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}