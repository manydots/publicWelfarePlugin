name: Client插件编译

on:
  workflow_dispatch:

jobs:
  build-client:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: true

      # 客户端版本号
      - name: 生成Client发布版本号
        id: version
        shell: bash
        run: |
          new_tag="client-v1.0.0"
          latest=$(gh release list --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [[ -n "$latest" && $latest =~ client-v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            new_tag="client-v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3]+1))"
          fi
          echo "tag=$new_tag" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: 查看项目信息
        shell: cmd
        run: |
          cd Client\Fd
          dir *.csproj *.vbproj 2>nul || echo No project files found
          type Fd.sln | findstr /i "GlobalSection.*SolutionConfigurationPlatforms" -A 10

      - name: 编译 Client/Fd/Fd.sln
        run: |
          # 尝试方式1：不指定平台
          msbuild "Client/Fd/Fd.sln" /p:Configuration=Release || \
          # 尝试方式2：使用 AnyCPU
          msbuild "Client/Fd/Fd.sln" /p:Configuration=Release /p:Platform="AnyCPU" || \
          # 尝试方式3：使用 .NET build
          dotnet build "Client/Fd/Fd.sln" -c Release
          
      - name: 收集编译的插件
        run: |
          mkdir output
          # 查找编译输出的 dll 文件
          dir /s /b Client\Fd\bin\Release\*.dll 2>nul || dir /s /b Client\Fd\bin\AnyCPU\Release\*.dll
          xcopy "Client\Fd\bin\Release\*.dll" "output\" /y /s /q 2>nul
          xcopy "Client\Fd\bin\AnyCPU\Release\*.dll" "output\" /y /s /q 2>nul
          xcopy "Client\Fd\bin\*.dll" "output\" /y /s /q 2>nul

      # 发布到 Releases
      - name: 上传到GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          body: "客户端插件\n Fd.dll"
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}