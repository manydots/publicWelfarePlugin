name: Client插件编译

on:
  workflow_dispatch:

jobs:
  build-client:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 生成Client发布版本号
        id: version
        shell: bash
        run: |
          new_tag="client-v1.0.0"
          latest=$(gh release list --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [[ -n "$latest" && $latest =~ client-v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            new_tag="client-v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3]+1))"
          fi
          echo "tag=$new_tag" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装MSBuild
        uses: microsoft/setup-msbuild@v2

      # 查看配置
      - name: 查看项目配置
        shell: cmd
        run: |
          cd Client\Fd
          echo "=== Solution file content (first 50 lines) ==="
          type Fd.sln | more
          echo ""
          echo "=== Searching for configurations in vcxproj ==="
          findstr /i "Configuration" Fd.vcxproj
          echo ""
          echo "=== Trying to build with default configuration ==="
          msbuild Fd.sln /p:Configuration=Release /target:ValidateSolutionConfiguration

      - name: 编译项目
        shell: cmd
        run: |
          cd Client\Fd
          
          # 方式1：不指定平台
          echo "=== Trying with no platform ==="
          msbuild Fd.sln /p:Configuration=Release
          
          if %errorlevel% neq 0 (
            echo "=== Trying with x86 platform ==="
            msbuild Fd.sln /p:Configuration=Release /p:Platform=x86
          )
          
          if %errorlevel% neq 0 (
            echo "=== Trying with AnyCPU platform ==="
            msbuild Fd.sln /p:Configuration=Release /p:Platform="Any CPU"
          )
          
          if %errorlevel% neq 0 (
            echo "=== Trying to build vcxproj directly ==="
            msbuild Fd.vcxproj /p:Configuration=Release /p:Platform=Win32
          )
          
      - name: 收集编译的插件
        run: |
          mkdir output
          echo "Searching for Fd.dll..."
          
          # 搜索所有位置的 Fd.dll
          for /r Client %%f in (Fd.dll) do (
            echo "Found: %%f"
            copy "%%f" output\
          )
          
          echo "Files in output:"
          dir output
          if exist output\Fd.dll (
            echo "Successfully collected Fd.dll"
          ) else (
            echo "ERROR: Fd.dll not found!"
            echo "Full directory listing:"
            dir /s Client
          )

      - name: 上传到GitHub Releases
        if: success() && hashFiles('output/Fd.dll') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          body: "客户端插件\n Fd.dll"
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}